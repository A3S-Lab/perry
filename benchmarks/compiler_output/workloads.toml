[workloads.h1_native_rep_equivalence]
source = "benchmarks/compiler_output/fixtures/h1_native_rep_equivalence.ts"
kind = "native_rep"

[workloads.h1_native_rep_equivalence.vectorization]
min_vectorized_loops = 0
scalar_baseline = "allowed: H1 gates native representation shape, not vector width"
allowed_missed_reason_kinds = [
  "call_instruction",
  "generic_not_vectorized",
  "not_beneficial",
  "uncountable_loop",
  "unknown_trip_count",
  "unsupported_instruction",
  "unsupported_reduction",
]

[workloads.h1_native_rep_equivalence.runtime_budgets]
allocations_traced = 0
gc_collections_traced = 0
write_barriers_static = 0
write_barriers_traced = 0
boxed_number_allocations_static = 0
buffer_slow_path_accesses_static = 0

[[workloads.h1_native_rep_equivalence.ir_checks]]
name = "h1_i32_phi_path"
section = "llvm_before"
regex_all = ["\\bicmp\\b[^\\n]*\\bi32\\b", "\\bload i32, ptr\\b", "\\bstore i32\\b"]
detail = "pre-opt codegen keeps loop/index state in i32 slots and i32 comparisons before LLVM may widen the IV"

[[workloads.h1_native_rep_equivalence.ir_checks]]
name = "h1_direct_raw_buffer_access"
regex_all = ["getelementptr", "\\bload (?:i8|<\\d+ x i8>), ptr\\b", "\\bstore (?:i8\\b|<\\d+ x i8>)"]
detail = "optimized IR has raw GEP/load/store buffer access"

[[workloads.h1_native_rep_equivalence.ir_checks]]
name = "h1_zero_buffer_helpers"
regex_none = ["@js_buffer_get", "@js_buffer_set"]
detail = "positive H1 fixture has no generic JS buffer helpers"

[[workloads.h1_native_rep_equivalence.counter_checks]]
name = "h1_no_buffer_slow_path"
section = "llvm_after"
counter = "buffer_slow_path_calls"
equals = 0
detail = "buffer_slow_path_calls"

[[workloads.h1_native_rep_equivalence.named_regions]]
name = "direct_bounded"
native_region_id = "h1_native_rep_equivalence_ts.module_init.direct_bounded"
