counter_any_min = { fmul = 1, fadd = 1 }

[[workloads.fma_contract.named_regions.checks]]
name = "named_region_numeric_loop_has_fp_ops"
min = { fmul = 1, fadd = 1 }
detail = "numeric loop FP multiply/add shape"

